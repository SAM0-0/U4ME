<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U4ME</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#1a1a1f;color:#c8c8cc;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,#2a2a35 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,#252530 0%,transparent 50%);z-index:-1}

.glass{background:rgba(40,40,50,0.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);border-radius:16px}

.container{max-width:480px;margin:0 auto;padding:20px 16px;min-height:100vh;display:flex;flex-direction:column}

.header{text-align:center;padding:40px 0 24px}
.header h1{font-size:22px;font-weight:500;color:#e0e0e4;letter-spacing:0.5px}
.header p{font-size:12px;color:#666;margin-top:4px;letter-spacing:1px;text-transform:uppercase}

.steps{display:flex;justify-content:center;gap:6px;margin:0 0 24px}
.steps .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.1);transition:all .3s}
.steps .dot.active{background:#8a8a9a}
.steps .dot.done{background:#6a6a7a}

.card{padding:24px;margin-bottom:16px}
.card h2{font-size:14px;font-weight:500;color:#9a9aa0;margin-bottom:20px;text-transform:uppercase;letter-spacing:1px}

label{display:block;font-size:12px;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#e0e0e4;font-size:15px;outline:none;transition:border-color .2s}
input:focus{border-color:rgba(255,255,255,0.2)}
input::placeholder{color:#444}

.btn{width:100%;padding:14px;background:rgba(255,255,255,0.08);color:#d0d0d4;border:1px solid rgba(255,255,255,0.08);border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;margin-top:16px;letter-spacing:0.3px}
.btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.15)}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

.btn-ghost{background:transparent;border:none;color:#666;font-size:13px;margin-top:12px;padding:8px}
.btn-ghost:hover{color:#999}

.back{display:inline-flex;align-items:center;gap:6px;color:#666;font-size:13px;cursor:pointer;padding:8px 0;margin-bottom:16px;transition:color .2s}
.back:hover{color:#999}
.back svg{width:16px;height:16px}

.hidden{display:none!important}

.status{padding:14px 16px;border-radius:12px;margin:12px 0;font-size:13px;line-height:1.5}
.status.info{background:rgba(100,100,120,0.15);border:1px solid rgba(100,100,120,0.2);color:#8a8a9a}
.status.success{background:rgba(100,120,100,0.15);border:1px solid rgba(100,120,100,0.2);color:#8a9a8a}
.status.error{background:rgba(120,80,80,0.15);border:1px solid rgba(120,80,80,0.2);color:#a08888}

.section{padding:20px;margin-bottom:16px}
.section h2{font-size:11px;font-weight:600;color:#555;margin-bottom:16px;text-transform:uppercase;letter-spacing:1.5px}

.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.row:last-child{border:none}
.row .k{font-size:13px;color:#666}
.row .v{font-size:13px;color:#c8c8cc;font-weight:500}

.health-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.health-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:16px;text-align:center}
.health-item .num{font-size:26px;font-weight:600;color:#d0d0d4}
.health-item .unit{font-size:11px;color:#555;margin-top:2px}

.bar-wrap{margin:12px 0}
.bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.bar-label .name{color:#666}
.bar-label .val{color:#999}
.bar{height:6px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}

.log-toggle{text-align:center;padding:12px;font-size:11px;color:#444;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
.log-toggle:hover{color:#666}
.log-box{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.04);border-radius:12px;padding:14px;font-family:'Cascadia Code','Fira Code',monospace;font-size:11px;max-height:300px;overflow-y:auto;line-height:1.7;white-space:pre-wrap;word-break:break-all;margin-bottom:16px}
.log-box .r{color:#6688aa}
.log-box .s{color:#88aa88}
.log-box .e{color:#aa7777}

.spinner{display:inline-block;width:14px;height:14px;border:1.5px solid rgba(255,255,255,0.1);border-top-color:#8a8a9a;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-loading{position:relative;overflow:hidden;background:rgba(255,255,255,0.04)!important;pointer-events:none}
.btn-loading::after{content:'';position:absolute;top:50%;left:50%;width:20px;height:20px;margin:-10px 0 0 -10px;border:2px solid transparent;border-top-color:#999;border-radius:50%;animation:spin .7s linear infinite}
.btn-loading span{opacity:0}
@keyframes pulse-border{0%,100%{border-color:rgba(255,255,255,0.08)}50%{border-color:rgba(255,255,255,0.2)}}
.btn-pulse{animation:pulse-border 1.5s ease infinite}

.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.shake{animation:shake .3s ease}
.card{transition:opacity .3s ease,transform .3s ease}
</style>
</head>
<body>

<div class="container">
  <div class="header fade-in">
    <h1>U4ME</h1>
  </div>

  <div class="steps" id="steps">
    <div class="dot" id="s1"></div>
    <div class="dot" id="s2"></div>
    <div class="dot" id="s3"></div>
    <div class="dot" id="s4"></div>
  </div>

  <!-- LOGIN -->
  <div id="viewLogin" class="glass card fade-in">
    <h2>Sign In</h2>
    <label>Mobile Number</label>
    <input type="tel" id="inMobile" placeholder="Mobile Number" maxlength="10" inputmode="numeric" pattern="[0-9]*" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    <label style="margin-top:14px">Password</label>
    <input type="password" id="inPass" placeholder="Password">
    <button class="btn" id="btnLogin" onclick="doLogin()">Continue</button>
  </div>

  <!-- OTP -->
  <div id="viewOtp" class="glass card fade-in hidden">
    <div class="back" onclick="goBack()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back</div>
    <h2>Verify OTP</h2>
    <p style="font-size:13px;color:#555;margin-bottom:16px">Enter the code sent to your device</p>
    <input type="tel" id="inOtp" placeholder="000000" maxlength="10" inputmode="numeric" pattern="[0-9]*" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    <button class="btn" id="btnOtp" onclick="doOtp()">Verify</button>
  </div>

  <!-- LOADING -->
  <div id="viewLoading" class="glass card fade-in hidden">
    <div id="loadingContent"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="viewDash" class="hidden fade-in">
    <div id="dashContent"></div>
    <div style="text-align:center;padding:20px 0">
      <button class="btn" style="width:auto;padding:10px 32px;opacity:0.5" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="log-toggle" onclick="toggleLog()">&#9662; API Log</div>
  <div id="logBox" class="log-box hidden"></div>
</div>

<script>
const BASE="https://bev-cors.pixel3demog.workers.dev";
let S={id:genId(),jwt:null,mfa:null,refresh:null,logOpen:false};

function genId(){const c="abcdefghijklmnopqrstuvwxyz0123456789";let s="";for(let i=0;i<16;i++)s+=c[Math.floor(Math.random()*c.length)];return s}

function log(t,m,c){const b=document.getElementById("logBox"),d=document.createElement("div");d.className=c||"";d.textContent=`[${t}] ${m}`;b.appendChild(d);b.scrollTop=b.scrollHeight}
function toggleLog(){S.logOpen=!S.logOpen;document.getElementById("logBox").classList.toggle("hidden",!S.logOpen)}

function step(n){for(let i=1;i<=4;i++){const e=document.getElementById("s"+i);e.className="dot"+(i<n?" done":i===n?" active":"")}}
function show(v){["viewLogin","viewOtp","viewLoading","viewDash"].forEach(id=>document.getElementById(id).classList.add("hidden"));document.getElementById(v).classList.remove("hidden")}
function loadMsg(h){document.getElementById("loadingContent").innerHTML=`<div class="status info">${h}</div>`}
function errMsg(r){
  if(!r)return"Unknown error";
  const m=r.message||r.error||"";
  const c=r.Code||"";
  const codeMap={"AE1015":"Invalid mobile or password","AE1013":"Account locked","AE1016":"Device blocked","AE1054":"Invalid credentials"};
  if(codeMap[c])return codeMap[c];
  const mMatch=m.match(/(?:AE\d+|ERR\d+)/);
  if(mMatch&&codeMap[mMatch[0]])return codeMap[mMatch[0]];
  if(m.includes("AE1015"))return"Invalid mobile or password";
  if(m.includes("AE1013"))return"Account locked";
  if(m.includes("AE1016"))return"Device blocked";
  if(m.includes("Unauthorized")||c==="401")return"Invalid mobile or password";
  return m||"Something went wrong";
}

async function api(method,path,hdrs,body){
  const url=BASE+path;
  const opts={method,headers:{"Appuniqueid":S.id,"Countryid":"41","Content-Type":"application/json","User-Agent":"okhttp/4.12.0",...hdrs||{}}};
  if(body)opts.body=JSON.stringify(body);
  log("REQ",`${method} ${path}`);
  const r=await fetch(url,opts);
  const txt=await r.text();
  let j=null;try{j=JSON.parse(txt)}catch(e){}
  const hasErr=j&&(j.error||j.Code);
  log("RES",`${r.status} ${path}${j?" "+JSON.stringify(j).substring(0,200):""}`,hasErr?"e":r.status>=400?"e":"s");
  const rh={};r.headers.forEach((v,k)=>{rh[k]=v});
  return{s:r.status,j,json:rh,t:txt};
}

async function doLogin(){
  const m=document.getElementById("inMobile").value.trim();
  const p=document.getElementById("inPass").value.trim();
  if(!m||!p)return;
  if(m.length!==10){document.getElementById("inMobile").style.borderColor="rgba(160,100,100,0.5)";setTimeout(()=>document.getElementById("inMobile").style.borderColor="",1500);return}
  const b=document.getElementById("btnLogin");
  b.disabled=true;b.classList.add("btn-loading");
  try{
    step(1);show("viewLoading");loadMsg("Checking registration...");
    let r=await api("GET",`/V1/auth/one-app/api/appLogin?mobileNumber=${m}&appName=INGLOApp&countryId=41`);
    if(r.s!==200)throw new Error("Registration check failed");

    step(2);loadMsg("Authenticating...");
    r=await api("GET","/V1/auth/login",{"Source":"MMCApp","X-Auth-Username":m,"X-Auth-Password":p,"Applogin":"INGLOApp"});
    if(r.s!==200&&r.s!==401)throw new Error(errMsg(r.j));

    const jwtH=r.json["jwttoken"]||r.json["Jwttoken"];
    if(jwtH){S.jwt=jwtH.replace("Bearer ","");log("INFO","Direct JWT received");await fetchAll();return}

    const mfaH=r.json["x-amzn-remapped-authorization"]||r.json["X-Amzn-Remapped-Authorization"];
    if(!mfaH){
      if(r.j?.error)throw new Error(errMsg(r.j));
      throw new Error("Login failed");
    }
    S.mfa=mfaH.replace("Bearer ","");

    step(3);loadMsg("Requesting OTP...");
    r=await api("GET","/V1/requestaccess/generateOtpAppIdMapping",{"Authorization":`Bearer ${S.mfa}`});
    if(r.j?.status!=="SUCCESS")throw new Error("OTP send failed");

    show("viewOtp");
  }catch(e){
    loadMsg(`<div class="status error">${e.message}</div><button class="btn-ghost" onclick="goBack()">← Back to login</button>`);
    log("ERR",e.message,"e");
  }finally{b.disabled=false;b.classList.remove("btn-loading");b.textContent="Continue"}
}

async function doOtp(){
  const otp=document.getElementById("inOtp").value.trim();
  if(!otp||otp.length<3){document.getElementById("inOtp").classList.add("shake");setTimeout(()=>document.getElementById("inOtp").classList.remove("shake"),400);return}
  const b=document.getElementById("btnOtp");
  b.disabled=true;b.classList.add("btn-loading");
  try{
    show("viewLoading");loadMsg("Verifying OTP...");step(3);
    const r=await api("POST","/V1/auth/validate/otp",{"Authorization":`Bearer ${S.mfa}`,"Otp":otp,"Appuniqueid":S.id,"Countryid":"41"});
    const jwtH=r.json["jwttoken"]||r.json["Jwttoken"];
    if(!jwtH)throw new Error("Invalid OTP");
    S.jwt=jwtH.replace("Bearer ","");
    await fetchAll();
  }catch(e){
    loadMsg(`<div class="status error">${e.message}</div><button class="btn-ghost" onclick="goBack()">← Back to login</button>`);
  }finally{b.disabled=false;b.classList.remove("btn-loading");b.textContent="Verify"}
}

function goBack(){show("viewLogin");step(1)}

async function fetchAll(){
  const h={"Authorization":`Bearer ${S.jwt}`};
  let html="";

  try{
    loadMsg("Loading profile...");
    const info=await api("GET","/V1/vehicleservice/myInfo",h);
    if(info.s===200&&info.j?.status==="Success")html+=renderUser(info.j.data);
  }catch(e){log("WARN","Profile: "+e.message,"e")}

  try{
    loadMsg("Loading battery data...");
    const perf=await api("GET","/V1/dataanalytics-service/vehicle-performance/fetch-data",h);
    if(perf.s===200&&perf.j?.dataModel){html+=renderHealth(perf.j.dataModel);html+=renderEnergy(perf.j.dataModel)}
  }catch(e){log("WARN","Battery: "+e.message,"e")}

  try{
    loadMsg("Loading energy breakdown...");
    const bat=await api("GET","/V1/dataanalytics-service/vehicle-battery/fetch-battery",h);
    if(bat.s===200&&bat.j?.dataModel)html+=renderBreakdown(bat.j.dataModel);
  }catch(e){log("WARN","Energy: "+e.message,"e")}

  document.getElementById("dashContent").innerHTML=html;
  step(4);show("viewDash");
}

function renderUser(d){
  if(!d)return"";
  let h=`<div class="section glass"><h2>Profile</h2>`;
  const rows=[["Name",d.displayName],["Mobile",d.mobileNumber],["Email",d.email],["BT MAC",d.btMac],["State",d.state],["District",d.district]];
  for(const[k,v]of rows)if(v)h+=`<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>`;
  h+="</div>";

  for(const v of(d.vehicleList||[])){
    h+=`<div class="section glass"><h2>${v.modelName||"Vehicle"}</h2>`;
    const vr=[["VIN",v.vinPlainText],["Registration",v.registrationNumber],["Color",v.color],["Battery",v.batterySpecification],["Motor",v.motorPower+" kW"],["Odometer",v.odometer?.toLocaleString()+" km"],["Year",v.make],["Purchase",v.purchaseDate],["Insurance Expiry",v.insuranceExpiry],["Service Due",v.serviceDueDate],["Warranty",v.originalWarrantyStartDate+" → "+v.originalWarrantyEndDate],["Subscription",v.subscriptionStatus?"Active":"Inactive"],["Primary User",v.primaryUserName]];
    for(const[k,vl]of vr)if(vl)h+=`<div class="row"><span class="k">${k}</span><span class="v">${vl}</span></div>`;
    if(v.climateSettings){h+=`<div class="row"><span class="k">AC Temp</span><span class="v">${v.climateSettings.acTemp}°C</span></div>`}
    h+="</div>";
  }
  return h;
}

function renderHealth(d){
  if(!d)return"";
  const items=[["SOH",d.hvBattSOH,"%"],["Efficiency",d.hvBattEffy,"%"],["Range",d.maxRange,"km"],["Charged",d.totalEnergyInput,"kWh"],["Consumed",d.totalEnergyConsumption,"kWh"],["Cycles",d.totalChrgCount,""]];
  let h=`<div class="section glass"><h2>Battery Health</h2><div class="health-grid">`;
  for(const[l,v,u]of items)h+=`<div class="health-item"><div class="num">${v??"—"}</div><div class="unit">${l}${u?" · "+u:""}</div></div>`;
  h+="</div></div>";return h;
}

function renderEnergy(d){
  if(!d)return"";
  const items=[["AC Cycles",d.chargeCountAC],["DC Cycles",d.chargeCountDC],["AC Input",d.energyInputAC,"kWh"],["DC Input",d.energyInputDC,"kWh"],["Regen",d.energyRegnted,"kWh"],["SOC Limit",d.socLimit,"%"]];
  let h=`<div class="section glass"><h2>Charging</h2>`;
  for(const[l,v,u]of items)if(v!=null)h+=`<div class="row"><span class="k">${l}</span><span class="v">${v}${u?" "+u:""}</span></div>`;
  h+="</div>";return h;
}

function renderBreakdown(d){
  if(!d)return"";
  const t=d.totalEnergyConsumption||1;
  const cats=[["Driving",d.energyConsumptionDrive,"#7a8a7a"],["Climate",d.energyConsumptionHVAC,"#7a7a8a"],["Battery Care",d.energyConsumptionBattCare,"#8a8a7a"],["Others",d.energyConsumptionAUX,"#8a7a7a"]];

  let h=`<div class="section glass"><h2>Energy Breakdown</h2>`;
  h+=`<div class="row"><span class="k">Total Consumed</span><span class="v">${d.totalEnergyConsumption??"—"} kWh</span></div>`;
  h+=`<div class="row"><span class="k">Accumulated</span><span class="v">${d.overallEnergyAccumulated??"—"} kWh</span></div>`;
  h+="<div style='height:12px'></div>";

  for(const[l,v,c]of cats){
    if(v==null)continue;
    const p=((v/t)*100).toFixed(1);
    h+=`<div class="bar-wrap"><div class="bar-label"><span class="name">${l}</span><span class="val">${v} kWh · ${p}%</span></div><div class="bar"><div class="bar-fill" style="width:${p}%;background:${c}"></div></div></div>`;
  }
  h+="</div>";return h;
}

function logout(){
  S.jwt=null;S.mfa=null;
  document.getElementById("inMobile").value="";
  document.getElementById("inPass").value="";
  document.getElementById("inOtp").value="";
  show("viewLogin");step(0);
}

document.getElementById("inMobile").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
document.getElementById("inPass").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
document.getElementById("inOtp").addEventListener("keydown",e=>{if(e.key==="Enter")doOtp()});
</script>
</body>
</html>
