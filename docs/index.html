<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U4ME - Under Development</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#1a1a1f;color:#c8c8cc;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,#2a2a35 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,#252530 0%,transparent 50%);z-index:-1}

.glass{background:rgba(40,40,50,0.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);border-radius:24px;padding:48px 32px;max-width:400px;width:90%}

.icon{width:64px;height:64px;background:rgba(255,255,255,0.05);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;border:1px solid rgba(255,255,255,0.1)}
.icon svg{width:32px;height:32px;color:#a0a0b0}

h1{font-size:24px;font-weight:600;color:#e0e0e4;margin-bottom:12px;letter-spacing:0.5px}
p{font-size:14px;color:#8a8a9a;line-height:1.6;margin-bottom:24px}

.btn{display:inline-block;padding:12px 24px;background:rgba(255,255,255,0.08);color:#d0d0d4;text-decoration:none;border:1px solid rgba(255,255,255,0.08);border-radius:12px;font-size:13px;font-weight:500;transition:all .2s;letter-spacing:0.5px}
.btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.15);color:#fff}

.pulse{animation:pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>

<div class="glass">
  <div class="icon pulse">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
    </svg>
  </div>
  <h1>Under Development</h1>
  <p>We are currently fixing some bugs and upgrading the web infrastructure. Please use the U4Me Android application in the meantime.</p>
  <a href="https://github.com/SAM0-0/U4ME/releases" class="btn">Download App</a>
</div>

</body>
</html>
